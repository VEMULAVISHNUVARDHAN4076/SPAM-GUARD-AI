<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpamGuard AI - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Same styles as login.html - copy them here or make a base template later */
        :root { --bg-start: #3b82f6; --bg-end: #06b6d4; --card-bg: rgba(255,255,255,0.94); --shadow: 0 20px 50px rgba(0,0,0,0.15); }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: var(--card-bg); backdrop-filter: blur(16px); border-radius: 1.5rem; padding: 2.5rem; box-shadow: var(--shadow); width: 100%; max-width: 420px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #1e40af; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem; }
        button { width: 100%; padding: 1rem; background: #3b82f6; color: white; border: none; border-radius: 0.75rem; font-size: 1.1rem; cursor: pointer; margin-top: 1rem; }
        button:hover { background: #2563eb; }
        .link { margin-top: 1.5rem; color: #4b5563; }
        .link a { color: #3b82f6; text-decoration: none; font-weight: 500; }
        .flash { padding: 0.8rem; border-radius: 0.5rem; margin-bottom: 1rem; }
        .success { background: #d1fae5; color: #065f46; }
        .danger  { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Choose Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Choose Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Register</button>
        </form>

        <div class="link">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </div>
    </div>
</body>
</html>
